name: Build Windows MinGW/GCC

# Each arch runs a two-phase Canadian cross compile.
# (Phase 1 Linux-hosted intermediate + Phase 2 Windows-hosted)

#   push:
#     branches: [ main ]
on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    # Built on Ubuntu 22.04 (glibc 2.35), but the deliverable is a Windows-hosted
    # toolchain (statically linked .exe binaries), so the build host's glibc does
    # not affect where the toolchain runs -- it runs on Windows.
    runs-on: ubuntu-22.04
    # One arch per job, in parallel; don't let one arch's failure cancel the rest.
    strategy:
      fail-fast: false
      matrix:
        arch: [i586, i686, x64]
    # Two from-source toolchains per arch (Phase 1 + Phase 2); still under 6h.
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: ./mingw_gcc_win.sh --deps

      - name: Build ${{ matrix.arch }}
        run: ./mingw_gcc_win.sh ${{ matrix.arch }}

      - name: Prepare Artifacts
        run: mkdir -v _artifacts && cp -al build/win_gcc/${{ matrix.arch }} _artifacts/

      - name: Upload build log
        # always grab the log, especially useful when the build fails
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log_gcc_win_${{ matrix.arch }}
          path: build/win_gcc/build.log
          if-no-files-found: ignore

      - name: Upload toolchain zips
        uses: actions/upload-artifact@v4
        with:
          # Upload the staged _artifacts dir (which holds exactly the one toolchain
          # folder). upload-artifact roots the zip at the given path's CONTENTS, so
          # pointing at _artifacts keeps the top-level "<prefix>/" folder inside the
          # zip (pointing at _artifacts/<prefix> would drop it, leaving bare bin/...).
          # That top folder is what lets the GN repo's `unzip -d tools/mingw/win`
          # land this as tools/mingw/win/<prefix>/.
          name: mingw_gcc_win_${{ matrix.arch }}
          path: _artifacts
          if-no-files-found: error
