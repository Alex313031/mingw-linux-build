name: Build Windows GCC MinGW

# Each arch runs a two-phase Canadian cross compile.
# (Phase 1 Linux-hosted intermediate + Phase 2 Windows-hosted)

#   push:
#     branches: [ main ]
on:
  workflow_dispatch:   # run on its own
  workflow_call:       # or be called by build-all.yml

jobs:
  build:
    name: Build ${{ matrix.arch }}
    # Built on Ubuntu 22.04 (glibc 2.35), but the deliverable is a Windows-hosted
    # toolchain (statically linked .exe binaries), so the build host's glibc does
    # not affect where the toolchain runs -- it runs on Windows.
    runs-on: ubuntu-22.04
    # One arch per job, in parallel; don't let one arch's failure cancel the rest.
    strategy:
      fail-fast: false
      matrix:
        arch: [i586, i686, x64]
    # Two from-source toolchains per arch (Phase 1 + Phase 2); still under 6h.
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: ./mingw_gcc_win.sh --deps

      - name: Build and package ${{ matrix.arch }}
        run: ./mingw_gcc_win.sh ${{ matrix.arch }} --package

      - name: Upload build log
        # always grab the log, especially useful when the build fails
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log_gcc_win_${{ matrix.arch }}
          path: build/win_gcc/build.log
          if-no-files-found: ignore

      - name: Upload toolchain zips
        uses: actions/upload-artifact@v4
        with:
          # Upload the script's own .zip (from --package). The Windows-hosted build
          # packages WITHOUT -y, so any symlinks are materialized into real copies
          # (Windows can't use symlinks). upload-artifact re-zips it, so the downloaded
          # artifact is <name>.zip containing the inner <prefix>.zip; extract that inner
          # zip and upload it as the release asset download_toolchains.sh fetches.
          name: mingw_gcc_win_${{ matrix.arch }}
          path: build/win_gcc/*.zip
          if-no-files-found: error
