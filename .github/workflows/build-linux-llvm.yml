name: Build Linux LLVM MinGW

# Each arch compiles a from-source MinGW/LLVM toolchain.

#   push:
#     branches: [ main ]
on:
  workflow_dispatch:   # run on its own
  workflow_call:       # or be called by build-all.yml

jobs:
  build:
    name: Build ${{ matrix.arch }}
    # Build on Ubuntu 22.04 (glibc 2.35) so the resulting Linux-hosted toolchain
    # runs on Ubuntu 22.04+ / Debian 12+. 22.04 is the oldest GitHub-hosted runner
    # image still available (20.04 was retired), so we build directly on it with
    # no container.
    runs-on: ubuntu-22.04
    # One arch per job, in parallel; don't let one arch's failure cancel the rest.
    strategy:
      fail-fast: false
      matrix:
        arch: [i586, i686, x64]
    # A full from-source LLVM/clang + runtimes build is heavy; give it room
    # (still under the 6h job ceiling).
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: ./mingw_llvm_linux.sh --deps

      - name: Build and package ${{ matrix.arch }}
        run: ./mingw_llvm_linux.sh ${{ matrix.arch }} --package

      - name: Upload build log
        # always grab the log, especially useful when the build fails
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log_llvm_linux_${{ matrix.arch }}
          path: build/linux_llvm/build.log
          if-no-files-found: ignore

      - name: Upload toolchain zips
        uses: actions/upload-artifact@v4
        with:
          # Upload the script's own .zip (from --package, built with -y so the
          # toolchain's symlinks -- the LLVM wrappers + llvm-* tools -- are preserved
          # instead of duplicated). upload-artifact re-zips it, so the downloaded
          # artifact is <name>.zip containing the inner <arch>_llvm.zip; extract that
          # inner zip and upload it as the release asset download_toolchains.sh fetches.
          name: mingw_llvm_linux_${{ matrix.arch }}
          path: build/linux_llvm/*.zip
          if-no-files-found: error
