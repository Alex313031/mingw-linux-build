name: Build Linux MinGW/LLVM

# Each arch compiles a from-source MinGW/LLVM toolchain.

#   push:
#     branches: [ main ]
on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    # Build on Ubuntu 22.04 (glibc 2.35) so the resulting Linux-hosted toolchain
    # runs on Ubuntu 22.04+ / Debian 12+. 22.04 is the oldest GitHub-hosted runner
    # image still available (20.04 was retired), so we build directly on it with
    # no container.
    runs-on: ubuntu-22.04
    # One arch per job, in parallel; don't let one arch's failure cancel the rest.
    strategy:
      fail-fast: false
      matrix:
        arch: [i586, i686, x64]
    # A full from-source LLVM/clang + runtimes build is heavy; give it room
    # (still under the 6h job ceiling).
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: ./mingw_llvm_linux.sh --deps

      - name: Build ${{ matrix.arch }}
        run: ./mingw_llvm_linux.sh ${{ matrix.arch }}

      - name: Prepare Artifacts
        run: mkdir -v _artifacts && cp -al build/linux_llvm/${{ matrix.arch }}_llvm _artifacts/

      - name: Upload build log
        # always grab the log, especially useful when the build fails
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log_llvm_linux_${{ matrix.arch }}
          path: build/linux_llvm/build.log
          if-no-files-found: ignore

      - name: Upload toolchain zips
        uses: actions/upload-artifact@v4
        with:
          # Upload the staged _artifacts dir (which holds exactly the one toolchain
          # folder, <arch>_llvm). upload-artifact roots the zip at the given path's
          # CONTENTS, so pointing at _artifacts keeps the top-level "<prefix>/" folder
          # inside the zip (pointing at _artifacts/<prefix> would drop it). That top
          # folder lets the GN repo's `unzip -d tools/mingw/linux` land this as
          # tools/mingw/linux/<arch>_llvm/.
          name: mingw_llvm_linux_${{ matrix.arch }}
          path: _artifacts
          if-no-files-found: error
