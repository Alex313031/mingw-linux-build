name: Build Linux toolchains

# Each arch compiles a from-source MinGW/GCC toolchain.

#   push:
#     branches: [ main ]
on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    # Build on Ubuntu 22.04 (glibc 2.35) so the resulting Linux-hosted toolchain
    # runs on Ubuntu 22.04+ / Debian 12+. 22.04 is the oldest GitHub-hosted runner
    # image still available (20.04 was retired), so we build directly on it with
    # no container.
    runs-on: ubuntu-22.04
    # One arch per job, in parallel; don't let one arch's failure cancel the rest.
    strategy:
      fail-fast: false
      matrix:
        arch: [i586, i686, x86_64]
    # A single from-source toolchain is long but well under the 6h job ceiling.
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: ./mingw-linux-build.sh --deps

      - name: Build ${{ matrix.arch }} and package
        run: ./mingw-linux-build.sh ${{ matrix.arch }} --package

      - name: Upload build log
        # always grab the log, especially useful when the build fails
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.arch }}
          path: build/build.log
          if-no-files-found: ignore

      - name: Upload toolchain zips
        uses: actions/upload-artifact@v4
        with:
          # one zip per job: i586.zip, i686.zip, or x64.zip (x86_64)
          name: mingw_linux_${{ matrix.arch }}
          path: build/*.zip
          if-no-files-found: error
